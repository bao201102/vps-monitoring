<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <style>
    .server-icon {
      fill: none;
      stroke: #18181b; /* Default: Dark charcoal for Light Mode */
      stroke-width: 3.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .indicator-dot {
      fill: #18181b; /* Default: Dark charcoal for Light Mode */
    }
    .status-dot-stroke {
      stroke: #ffffff; /* White boundary for Light Mode tab */
    }
    @media (prefers-color-scheme: dark) {
      .server-icon {
        stroke: #e4e4e7; /* Light gray for Dark Mode tab */
      }
      .indicator-dot {
        fill: #e4e4e7; /* Light gray for Dark Mode tab */
      }
      .status-dot-stroke {
        stroke: #121214; /* Dark boundary for Dark Mode tab */
      }
    }
  </style>
  <g class="server-icon">
    <rect x="14" y="16" width="36" height="12" rx="3"/>
    <rect x="14" y="36" width="36" height="12" rx="3"/>
  </g>
  <circle cx="20" cy="22" r="1.8" class="indicator-dot"/>
  <circle cx="20" cy="42" r="1.8" class="indicator-dot"/>
  <g class="server-icon">
    <line x1="26" y1="22" x2="44" y2="22"/>
    <line x1="26" y1="42" x2="44" y2="42"/>
  </g>
  <circle cx="50" cy="50" r="6.5" fill="#22c55e" class="status-dot-stroke" stroke-width="2"/>
</svg>
